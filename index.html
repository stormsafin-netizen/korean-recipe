<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韓国料理レシピアプリ 🇰🇷</title>
  <style>
    :root {
      --red: #C0392B;
      --red-light: #E74C3C;
      --red-bg: #fdf2f2;
      --blue: #2C3E7A;
      --blue-light: #3D5FA0;
      --white: #fff;
      --gray-light: #f5f5f5;
      --gray: #e0e0e0;
      --text: #2c2c2c;
      --text-muted: #777;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%);
      min-height: 100vh;
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--red) 0%, var(--blue) 100%);
      color: white;
      text-align: center;
      padding: 28px 20px 20px;
    }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: 0.02em; }
    header p { font-size: 0.95rem; opacity: 0.88; margin-top: 6px; }

    .tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid var(--gray);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      line-height: 1.4;
    }
    .tab-btn:hover { color: var(--red); background: var(--red-bg); }
    .tab-btn.active {
      color: var(--red);
      border-bottom-color: var(--red);
      background: var(--red-bg);
    }
    .tab-btn .icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }

    .tab-panel { display: none; padding: 24px 16px; max-width: 680px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--gray);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--red-light); }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-light) 100%);
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }
    .btn-secondary {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    }

    .tag-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      min-height: 36px;
    }
    .tag {
      background: var(--blue);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag .remove {
      cursor: pointer;
      opacity: 0.8;
      font-size: 1rem;
      line-height: 1;
    }
    .tag .remove:hover { opacity: 1; }

    .hint-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .results { margin-top: 20px; }

    .dish-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .dish-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
    }
    .dish-card-header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--gray);
    }
    .dish-emoji { font-size: 2.2rem; }
    .dish-name-block { flex: 1; }
    .dish-name-jp { font-size: 1.1rem; font-weight: 700; }
    .dish-name-kr { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
    .match-badge {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid #f9c6c6;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .dish-card-body { padding: 14px 18px 16px; }
    .dish-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; }
    .ingredient-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: var(--gray-light);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--text);
    }
    .chip.matched {
      background: #fde8e8;
      color: var(--red);
      font-weight: 600;
    }

    .recipe-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .recipe-header {
      background: linear-gradient(135deg, var(--red) 0%, var(--blue) 100%);
      color: white;
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .recipe-emoji { font-size: 3rem; }
    .recipe-title { font-size: 1.4rem; font-weight: 800; }
    .recipe-subtitle { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
    .recipe-body { padding: 20px; }
    .recipe-section { margin-bottom: 20px; }
    .recipe-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      border-left: 4px solid var(--red);
      padding-left: 10px;
      margin-bottom: 12px;
    }
    .ingredient-list { list-style: none; }
    .ingredient-list li {
      padding: 7px 0;
      border-bottom: 1px solid var(--gray-light);
      display: flex;
      gap: 8px;
      font-size: 0.92rem;
    }
    .ingredient-list li:last-child { border-bottom: none; }
    .ing-bullet { color: var(--red); font-weight: 700; }
    .step-list { list-style: none; counter-reset: steps; }
    .step-list li {
      counter-increment: steps;
      padding: 10px 0 10px 44px;
      border-bottom: 1px solid var(--gray-light);
      font-size: 0.92rem;
      line-height: 1.6;
      position: relative;
    }
    .step-list li:last-child { border-bottom: none; }
    .step-list li::before {
      content: counter(steps);
      position: absolute;
      left: 0;
      top: 10px;
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-light) 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .meta-item {
      background: var(--gray-light);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    .dish-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .dish-grid-item {
      background: white;
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s;
      border: 2px solid transparent;
    }
    .dish-grid-item:hover {
      transform: translateY(-2px);
      border-color: var(--red-light);
    }
    .dish-grid-item .em { font-size: 2rem; margin-bottom: 6px; }
    .dish-grid-item .nm { font-size: 0.8rem; font-weight: 600; line-height: 1.3; }
    .dish-grid-item .kr { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    .fridge-score {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .score-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--gray);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-light), var(--red));
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .score-text { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

    .no-results {
      background: white;
      border-radius: var(--radius);
      padding: 30px 20px;
      text-align: center;
      color: var(--text-muted);
      box-shadow: var(--shadow);
    }
    .no-results .icon { font-size: 2.5rem; margin-bottom: 10px; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.5rem; }
      .tab-btn { font-size: 0.75rem; padding: 11px 4px; }
      .tab-btn .icon { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🇰🇷 韓国料理レシピ</h1>
  <p>食材・料理名・冷蔵庫から韓国料理を探そう</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('ingredient')">
    <span class="icon">🥕</span>食材から<br>料理を探す
  </button>
  <button class="tab-btn" onclick="switchTab('recipe')">
    <span class="icon">📖</span>料理名から<br>レシピを見る
  </button>
  <button class="tab-btn" onclick="switchTab('fridge')">
    <span class="icon">🧊</span>冷蔵庫の<br>食材で提案
  </button>
</div>

<!-- TAB 1: 食材 → 料理 -->
<div class="tab-panel active" id="tab-ingredient">
  <div class="section-title">🥕 食材から韓国料理を探す</div>
  <p class="hint-label">食材を入力してEnterまたは「追加」を押してください</p>
  <div class="input-row">
    <input type="text" id="ing-input" placeholder="例: 豚バラ、キムチ、豆腐..." onkeydown="if(event.key==='Enter')addIngredient()">
    <button class="btn" onclick="addIngredient()">追加</button>
  </div>
  <div class="tag-area" id="ing-tags"></div>
  <button class="btn btn-secondary" onclick="searchByIngredients()" style="width:100%">🔍 この食材で作れる料理を探す</button>
  <div class="results" id="ing-results"></div>
</div>

<!-- TAB 2: 料理名 → レシピ -->
<div class="tab-panel" id="tab-recipe">
  <div class="section-title">📖 料理名からレシピを見る</div>
  <p class="hint-label">料理名（日本語または韓国語）を検索、またはリストから選択</p>
  <div class="input-row">
    <input type="text" id="recipe-input" placeholder="例: キムチチゲ、비빔밥..." oninput="filterDishGrid()" onkeydown="if(event.key==='Enter')searchRecipe()">
    <button class="btn" onclick="searchRecipe()">検索</button>
  </div>
  <div id="dish-grid" class="dish-grid"></div>
  <div class="results" id="recipe-results"></div>
</div>

<!-- TAB 3: 冷蔵庫 → 提案 -->
<div class="tab-panel" id="tab-fridge">
  <div class="section-title">🧊 冷蔵庫の食材から料理を提案</div>
  <p class="hint-label">今ある食材を登録すると、作れる料理を多い順に表示します</p>
  <div class="input-row">
    <input type="text" id="fridge-input" placeholder="冷蔵庫の食材を入力..." onkeydown="if(event.key==='Enter')addFridgeItem()">
    <button class="btn" onclick="addFridgeItem()">追加</button>
  </div>
  <div class="tag-area" id="fridge-tags"></div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="btn btn-secondary" onclick="suggestFromFridge()" style="flex:1">🍳 作れる料理を提案する</button>
    <button class="btn" style="background:var(--gray);color:var(--text-muted)" onclick="clearFridge()">クリア</button>
  </div>
  <div class="results" id="fridge-results"></div>
</div>

// ============================================================
// STATE
// ============================================================
let ingTags = [];
let fridgeTags = [];

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const idx = {ingredient:0, recipe:1, fridge:2}[tab];
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (tab === 'recipe') renderDishGrid('');
}

// ============================================================
// TAB 1: INGREDIENT → DISHES
// ============================================================
function addIngredient() {
  const input = document.getElementById('ing-input');
  const val = input.value.trim();
  if (!val) return;
  const items = val.split(/[、,，\s]+/).map(s => s.trim()).filter(Boolean);
  items.forEach(item => {
    if (item && !ingTags.includes(item)) ingTags.push(item);
  });
  input.value = '';
  renderIngTags();
}

function renderIngTags() {
  const area = document.getElementById('ing-tags');
  area.innerHTML = ingTags.map((t, i) =>
    `<div class="tag">${t}<span class="remove" onclick="removeIngTag(${i})">×</span></div>`
  ).join('');
}

function removeIngTag(i) {
  ingTags.splice(i, 1);
  renderIngTags();
}

function searchByIngredients() {
  const results = document.getElementById('ing-results');
  if (ingTags.length === 0) {
    results.innerHTML = `<div class="empty-state"><div class="icon">🥕</div><p>食材を入力してください</p></div>`;
    return;
  }
  const normalizedInput = ingTags.map(t => normalize(t));
  const scored = RECIPES.map(r => {
    const matched = r.tags.filter(tag => normalizedInput.some(ni => normalize(tag).includes(ni) || ni.includes(normalize(tag))));
    return { recipe: r, matched, score: matched.length };
  }).filter(r => r.score > 0).sort((a, b) => b.score - a.score);

  if (scored.length === 0) {
    results.innerHTML = `<div class="no-results"><div class="icon">😅</div><p>その食材で作れる料理が見つかりませんでした。<br>別の食材を試してみてください。</p></div>`;
    return;
  }

  results.innerHTML = `<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">${scored.length}件の料理が見つかりました</p>` +
    scored.map(({ recipe: r, matched }) => {
      const chips = r.tags.map(tag => {
        const isMatch = matched.some(m => normalize(m) === normalize(tag));
        return `<span class="chip${isMatch ? ' matched' : ''}">${tag}</span>`;
      }).join('');
      return `<div class="dish-card" onclick="showRecipeDetail('${r.id}', 'ingredient')">
        <div class="dish-card-header">
          <div class="dish-emoji">${r.emoji}</div>
          <div class="dish-name-block">
            <div class="dish-name-jp">${r.nameJp}</div>
            <div class="dish-name-kr">${r.nameKr}</div>
          </div>
          <div class="match-badge">${matched.length}/${ingTags.length} 一致</div>
        </div>
        <div class="dish-card-body">
          <div class="dish-desc">${r.desc}</div>
          <div class="ingredient-chips">${chips}</div>
        </div>
      </div>`;
    }).join('');
}

// ============================================================
// TAB 2: RECIPE NAME → RECIPE
// ============================================================
function renderDishGrid(filter) {
  const norm = normalize(filter);
  const grid = document.getElementById('dish-grid');
  const filtered = RECIPES.filter(r =>
    !norm ||
    normalize(r.nameJp).includes(norm) ||
    normalize(r.nameKr).includes(norm) ||
    r.tags.some(t => normalize(t).includes(norm))
  );
  grid.innerHTML = filtered.map(r =>
    `<div class="dish-grid-item" onclick="showRecipeDetail('${r.id}', 'recipe')">
      <div class="em">${r.emoji}</div>
      <div class="nm">${r.nameJp}</div>
      <div class="kr">${r.nameKr}</div>
    </div>`
  ).join('');
}

function filterDishGrid() {
  const val = document.getElementById('recipe-input').value;
  renderDishGrid(val);
  document.getElementById('recipe-results').innerHTML = '';
}

function searchRecipe() {
  const val = document.getElementById('recipe-input').value.trim();
  if (!val) return;
  const norm = normalize(val);
  const found = RECIPES.find(r =>
    normalize(r.nameJp).includes(norm) ||
    normalize(r.nameKr).includes(norm)
  );
  if (found) {
    showRecipeDetail(found.id, 'recipe');
  } else {
    document.getElementById('recipe-results').innerHTML =
      `<div class="no-results"><div class="icon">🤔</div><p>「${val}」のレシピが見つかりませんでした</p></div>`;
  }
}

function showRecipeDetail(id, tabId) {
  const r = RECIPES.find(r => r.id === id);
  if (!r) return;
  const html = `
    <div class="recipe-card">
      <div class="recipe-header">
        <div class="recipe-emoji">${r.emoji}</div>
        <div>
          <div class="recipe-title">${r.nameJp}</div>
          <div class="recipe-subtitle">${r.nameKr} — ${r.desc}</div>
        </div>
      </div>
      <div class="recipe-body">
        <div class="meta-row">
          <div class="meta-item">⏱️ ${r.time}</div>
          <div class="meta-item">👥 ${r.serving}</div>
          <div class="meta-item">🔥 難易度 ${r.difficulty}</div>
        </div>
        <div class="recipe-section">
          <div class="recipe-section-title">材料</div>
          <ul class="ingredient-list">
            ${r.ingredients.map(i => `<li><span class="ing-bullet">▸</span><span>${i.name}</span><span style="margin-left:auto;color:var(--text-muted)">${i.amount}</span></li>`).join('')}
          </ul>
        </div>
        <div class="recipe-section">
          <div class="recipe-section-title">作り方</div>
          <ol class="step-list">
            ${r.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>
      </div>
    </div>`;
  document.getElementById(tabId === 'ingredient' ? 'ing-results' : 'recipe-results').innerHTML = html;
  // Scroll to results
  setTimeout(() => {
    document.getElementById(tabId === 'ingredient' ? 'ing-results' : 'recipe-results')
      .scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// ============================================================
// TAB 3: FRIDGE → SUGGEST
// ============================================================
function addFridgeItem() {
  const input = document.getElementById('fridge-input');
  const val = input.value.trim();
  if (!val) return;
  const items = val.split(/[、,，\s]+/).map(s => s.trim()).filter(Boolean);
  items.forEach(item => {
    if (item && !fridgeTags.includes(item)) fridgeTags.push(item);
  });
  input.value = '';
  renderFridgeTags();
}

function renderFridgeTags() {
  const area = document.getElementById('fridge-tags');
  area.innerHTML = fridgeTags.map((t, i) =>
    `<div class="tag">${t}<span class="remove" onclick="removeFridgeTag(${i})">×</span></div>`
  ).join('');
}

function removeFridgeTag(i) {
  fridgeTags.splice(i, 1);
  renderFridgeTags();
}

function clearFridge() {
  fridgeTags = [];
  renderFridgeTags();
  document.getElementById('fridge-results').innerHTML = '';
}

function suggestFromFridge() {
  const results = document.getElementById('fridge-results');
  if (fridgeTags.length === 0) {
    results.innerHTML = `<div class="empty-state"><div class="icon">🧊</div><p>冷蔵庫の食材を追加してください</p></div>`;
    return;
  }
  const normalizedFridge = fridgeTags.map(t => normalize(t));

  const scored = RECIPES.map(r => {
    const totalTags = r.tags.length;
    const matched = r.tags.filter(tag =>
      normalizedFridge.some(ni => normalize(tag).includes(ni) || ni.includes(normalize(tag)))
    );
    const ratio = matched.length / totalTags;
    return { recipe: r, matched, total: totalTags, ratio };
  }).filter(r => r.matched.length > 0)
    .sort((a, b) => b.ratio - a.ratio || b.matched.length - a.matched.length);

  if (scored.length === 0) {
    results.innerHTML = `<div class="no-results"><div class="icon">😅</div><p>冷蔵庫の食材では作れる料理が見つかりませんでした。<br>食材を追加してみてください。</p></div>`;
    return;
  }

  results.innerHTML = `<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">${scored.length}件の料理が提案されました（食材一致率順）</p>` +
    scored.map(({ recipe: r, matched, total, ratio }) => {
      const pct = Math.round(ratio * 100);
      const chips = r.tags.map(tag => {
        const isMatch = matched.some(m => normalize(m) === normalize(tag));
        return `<span class="chip${isMatch ? ' matched' : ''}">${tag}</span>`;
      }).join('');
      return `<div class="dish-card" onclick="showFridgeDetail('${r.id}')">
        <div class="dish-card-header">
          <div class="dish-emoji">${r.emoji}</div>
          <div class="dish-name-block">
            <div class="dish-name-jp">${r.nameJp}</div>
            <div class="dish-name-kr">${r.nameKr}</div>
          </div>
          <div class="match-badge">${matched.length}/${total}</div>
        </div>
        <div class="dish-card-body">
          <div class="dish-desc">${r.desc}</div>
          <div class="fridge-score">
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
            <span class="score-text">食材一致率 ${pct}%</span>
          </div>
          <div class="ingredient-chips" style="margin-top:10px">${chips}</div>
        </div>
      </div>`;
    }).join('');
}

function showFridgeDetail(id) {
  const r = RECIPES.find(r => r.id === id);
  if (!r) return;
  const normalizedFridge = fridgeTags.map(t => normalize(t));
  const missing = r.ingredients.filter(ing =>
    !normalizedFridge.some(f => normalize(ing.name).includes(f) || f.includes(normalize(ing.name)))
  );

  let missingHtml = '';
  if (missing.length > 0) {
    missingHtml = `<div class="recipe-section">
      <div class="recipe-section-title" style="color:var(--red)">不足している食材</div>
      <ul class="ingredient-list">
        ${missing.map(i => `<li><span class="ing-bullet" style="color:var(--red)">!</span><span>${i.name}</span><span style="margin-left:auto;color:var(--text-muted)">${i.amount}</span></li>`).join('')}
      </ul>
    </div>`;
  }

  const resultEl = document.getElementById('fridge-results');
  resultEl.innerHTML = `
    <div class="recipe-card" style="margin-top:20px">
      <div class="recipe-header">
        <div class="recipe-emoji">${r.emoji}</div>
        <div>
          <div class="recipe-title">${r.nameJp}</div>
          <div class="recipe-subtitle">${r.nameKr} — ${r.desc}</div>
        </div>
      </div>
      <div class="recipe-body">
        <div class="meta-row">
          <div class="meta-item">⏱️ ${r.time}</div>
          <div class="meta-item">👥 ${r.serving}</div>
          <div class="meta-item">🔥 難易度 ${r.difficulty}</div>
        </div>
        ${missingHtml}
        <div class="recipe-section">
          <div class="recipe-section-title">材料（全て）</div>
          <ul class="ingredient-list">
            ${r.ingredients.map(i => {
              const has = normalizedFridge.some(f => normalize(i.name).includes(f) || f.includes(normalize(i.name)));
              return `<li style="${has ? 'opacity:1' : 'opacity:0.5'}">
                <span class="ing-bullet">${has ? '✓' : '▸'}</span>
                <span>${i.name}</span>
                <span style="margin-left:auto;color:var(--text-muted)">${i.amount}</span>
              </li>`;
            }).join('')}
          </ul>
        </div>
        <div class="recipe-section">
          <div class="recipe-section-title">作り方</div>
          <ol class="step-list">
            ${r.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>
      </div>
    </div>`;
  setTimeout(() => {
    document.querySelector('.recipe-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// ============================================================
// UTILITY
// ============================================================
function normalize(str) {
  return str
    .toLowerCase()
    .replace(/[ぁ-ん]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60))
    .replace(/\s+/g, '');
}

// Init
renderDishGrid('');
</script>
