<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#d62828">
<meta name="description" content="冷蔵庫の食材から作れる韓国料理を探せるレシピアプリ。60品のレシピを収録。">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="韓国レシピ">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>韓国料理レシピ 🇰🇷 — 食材から探せるレシピアプリ</title>
<style>
:root{
  --red:#d62828;
  --red-dark:#b51f1f;
  --orange:#f77f3f;
  --green:#2a9d4a;
  --bg:#fff7f5;
  --card:#ffffff;
  --text:#2b2b2b;
  --muted:#8a8a8a;
  --line:#f0e4e0;
  --radius:16px;
  --shadow:0 4px 18px rgba(180,60,40,.10);
  --nav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  line-height:1.55;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;border:none;background:none}
input{font-family:inherit}

/* ===== Header ===== */
.app-header{
  background:linear-gradient(135deg,var(--red) 0%,var(--orange) 100%);
  color:#fff;
  padding:calc(18px + env(safe-area-inset-top)) 16px 18px;
  border-radius:0 0 22px 22px;
  box-shadow:var(--shadow);
}
.header-inner{max-width:980px;margin:0 auto;text-align:center}
.app-header h1{font-size:1.45rem;font-weight:800;letter-spacing:.02em}
.app-header p{font-size:.82rem;opacity:.9;margin-top:2px}
.mode-switch{
  display:none;
  margin:16px auto 0;
  background:rgba(255,255,255,.18);
  border-radius:999px;
  padding:4px;
  max-width:420px;
  gap:4px;
}
.mode-btn{
  flex:1;
  padding:10px 18px;
  border-radius:999px;
  color:#fff;
  font-size:.92rem;
  font-weight:700;
  transition:background .2s,color .2s;
}
.mode-btn.active{background:#fff;color:var(--red)}

/* ===== Layout ===== */
main{max-width:980px;margin:0 auto;padding:16px 14px 0}

/* ===== Search card ===== */
.search-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:18px;
}
.section-label{font-size:1rem;font-weight:800;margin-bottom:12px}
.input-row{display:flex;gap:8px}
.input-row input{
  flex:1;
  min-width:0;
  padding:12px 14px;
  border:2px solid var(--line);
  border-radius:12px;
  font-size:16px; /* 16px未満だとiOSがフォーカス時に自動ズームする */
  outline:none;
  background:#fff;
  transition:border-color .2s;
  -webkit-appearance:none;
  appearance:none;
}
.input-row input:focus{border-color:var(--orange)}
.add-btn{
  padding:0 20px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--red),var(--orange));
  color:#fff;
  font-size:.95rem;
  font-weight:700;
  white-space:nowrap;
}
.add-btn:active{transform:scale(.96)}

.tags-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tags-area:empty{margin-top:0}
.tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--red);
  color:#fff;
  border-radius:999px;
  padding:7px 8px 7px 14px;
  font-size:.88rem;
  font-weight:700;
}
.tag-remove{
  width:22px;height:22px;
  border-radius:50%;
  background:rgba(255,255,255,.25);
  color:#fff;
  font-size:11px;
  line-height:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.quick-label{font-size:.78rem;color:var(--muted);margin:14px 0 8px}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px}
.quick-tag{
  padding:8px 14px;
  border-radius:999px;
  border:1.5px solid var(--line);
  background:#fff;
  font-size:.86rem;
  color:var(--text);
  transition:all .15s;
}
.quick-tag.selected{
  background:var(--red);
  border-color:var(--red);
  color:#fff;
  font-weight:700;
}
.quick-tag:active{transform:scale(.95)}

/* ===== Empty state ===== */
.empty-state{
  text-align:center;
  padding:48px 20px;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.empty-emoji{font-size:3rem;margin-bottom:10px}
.empty-title{font-size:1.05rem;font-weight:800;margin-bottom:6px}
.empty-desc{font-size:.85rem;color:var(--muted)}

/* ===== Results ===== */
.results-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 2px 12px;
}
.results-header h2{font-size:1.05rem;font-weight:800}
.results-count{
  background:var(--red);
  color:#fff;
  font-size:.75rem;
  font-weight:700;
  border-radius:999px;
  padding:3px 12px;
}
.results-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:720px){.results-grid{grid-template-columns:repeat(2,1fr)}}

.recipe-card{
  position:relative;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.recipe-card:active{transform:scale(.985)}
.card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.card-emoji{
  font-size:2rem;
  width:56px;height:56px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  border-radius:14px;
}
.card-info{min-width:0;padding-right:18px}
.card-title{font-size:1.02rem;font-weight:800}
.card-korean{font-size:.78rem;font-weight:500;color:var(--muted)}
.card-desc{
  font-size:.82rem;color:var(--muted);margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.match-bar-wrap{margin-bottom:10px}
.match-label{
  display:flex;justify-content:space-between;
  font-size:.74rem;color:var(--muted);margin-bottom:4px;
}
.match-label .pct{font-weight:800;color:var(--red)}
.match-bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.match-fill{
  height:100%;
  background:linear-gradient(90deg,var(--orange),var(--red));
  border-radius:999px;
  transition:width .4s ease;
}
.card-tags{display:flex;flex-wrap:wrap;gap:6px}
.card-tag{font-size:.72rem;font-weight:700;border-radius:999px;padding:4px 10px}
.card-tag.have{background:#e8f6ec;color:var(--green)}
.card-tag.need{background:#f4f4f4;color:#999}
.card-arrow{
  position:absolute;top:18px;right:14px;
  color:#ccc;font-size:1.4rem;font-weight:700;line-height:1;
}

/* ===== Recipe list (mini cards) ===== */
.all-recipes-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:720px){.all-recipes-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:980px){.all-recipes-grid{grid-template-columns:repeat(3,1fr)}}
.mini-card{
  display:flex;align-items:center;gap:12px;
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:12px 14px;
  cursor:pointer;
  transition:transform .15s;
}
.mini-card:active{transform:scale(.98)}
.mini-emoji{
  font-size:1.5rem;
  width:46px;height:46px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  border-radius:12px;
}
.mini-info{min-width:0;flex:1}
.mini-title{font-size:.94rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-sub{font-size:.75rem;color:var(--muted)}
.mini-arrow{color:#ccc;font-size:1.3rem;font-weight:700}

/* ===== Bottom navigation (mobile) ===== */
.bottom-nav{
  position:fixed;
  left:0;right:0;bottom:0;
  z-index:50;
  display:flex;
  background:rgba(255,255,255,.96);
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  font-size:.7rem;
  font-weight:700;
  color:var(--muted);
}
.nav-btn .nav-icon{font-size:1.3rem;line-height:1}
.nav-btn.active{color:var(--red)}
@media(min-width:720px){
  .bottom-nav{display:none}
  .mode-switch{display:flex}
  body{padding-bottom:32px}
}

/* ===== Scroll-top button ===== */
#scrollTopBtn{
  position:fixed;
  right:16px;
  bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  z-index:40;
  width:44px;height:44px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  font-size:1.2rem;
  box-shadow:0 4px 14px rgba(180,40,30,.35);
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:opacity .25s,transform .25s;
}
#scrollTopBtn.show{opacity:1;pointer-events:auto;transform:translateY(0)}
@media(min-width:720px){#scrollTopBtn{bottom:24px}}

/* ===== Modal (bottom sheet) ===== */
#modalOverlay{
  position:fixed;
  inset:0;
  z-index:100;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
}
#modalOverlay.show{opacity:1;pointer-events:auto}
#modal{
  position:relative;
  background:#fff;
  width:100%;
  max-width:640px;
  max-height:92vh;
  max-height:92dvh;
  border-radius:22px 22px 0 0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:0 20px calc(28px + env(safe-area-inset-bottom));
  transform:translateY(40px);
  transition:transform .3s ease,opacity .3s ease;
}
#modalOverlay.show #modal{transform:translateY(0)}
@media(min-width:720px){
  #modalOverlay{align-items:center;padding:24px}
  #modal{border-radius:22px;max-height:86vh;padding-bottom:28px}
}
#modalHandleArea{
  position:sticky;
  top:0;
  z-index:5;
  background:#fff;
  padding:10px 0 8px;
  touch-action:pan-y;
}
.handle-bar{
  width:44px;height:5px;
  border-radius:999px;
  background:#ddd;
  margin:0 auto;
}
.modal-close{
  position:sticky;
  top:10px;
  float:right;
  z-index:6;
  width:34px;height:34px;
  border-radius:50%;
  background:#f2f2f2;
  color:#666;
  font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
}
.modal-emoji{font-size:3.2rem;text-align:center;margin-top:4px}
.modal-title{font-size:1.4rem;font-weight:800;text-align:center;margin-top:6px}
.modal-korean{font-size:.95rem;color:var(--muted);text-align:center}
.modal-desc{font-size:.88rem;color:var(--muted);text-align:center;margin:8px auto 0;max-width:440px}
.modal-meta{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin:18px 0;
}
@media(min-width:480px){.modal-meta{grid-template-columns:repeat(4,1fr)}}
.meta-item{
  background:var(--bg);
  border-radius:12px;
  padding:10px 6px;
  text-align:center;
  font-size:.8rem;
  font-weight:700;
}
.meta-item span{display:block;font-size:1.1rem;margin-bottom:2px}
.modal-section{margin-top:22px}
.modal-section h3{
  font-size:1rem;font-weight:800;
  display:flex;align-items:center;gap:6px;
  margin-bottom:12px;
}
.ingredients-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:480px){.ingredients-grid{grid-template-columns:repeat(2,1fr)}}
.ingredient-item{
  display:flex;align-items:center;gap:8px;
  background:#fafafa;
  border:1px solid var(--line);
  border-radius:10px;
  padding:9px 12px;
  font-size:.88rem;
}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.main{background:var(--red)}
.dot.sub{background:var(--orange)}
.dot.sauce{background:#c9a227}
.steps-list{list-style:none}
.step-item{
  display:flex;gap:12px;
  align-items:flex-start;
  padding:10px 0;
  border-bottom:1px dashed var(--line);
}
.step-item:last-child{border-bottom:none}
.step-num{
  width:26px;height:26px;
  flex-shrink:0;
  border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--orange));
  color:#fff;
  font-size:.8rem;
  font-weight:800;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;
}
.step-text{font-size:.9rem}
.tip-box{
  background:#fff8e8;
  border:1.5px solid #f3dfa8;
  border-radius:12px;
  padding:14px;
  font-size:.88rem;
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
  html{scroll-behavior:auto}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <h1>🇰🇷 韓国料理レシピ</h1>
    <p>冷蔵庫の食材から作れる韓国料理を探そう！全60品</p>
    <div class="mode-switch">
      <button id="deskModeIng" class="mode-btn active" onclick="switchMode('ingredient')">🧊 食材から探す</button>
      <button id="deskModeRec" class="mode-btn" onclick="switchMode('recipe')">📚 レシピ一覧</button>
    </div>
  </div>
</header>

<main>
  <!-- 食材から探すモード -->
  <section id="ingredientMode">
    <div class="search-card">
      <h2 class="section-label">🧊 冷蔵庫にある食材は？</h2>
      <div class="input-row">
        <input id="ingredientInput" type="search" placeholder="例：豚肉、キムチ、豆腐…" autocomplete="off" enterkeyhint="done">
        <button class="add-btn" onclick="addIngredient()">追加</button>
      </div>
      <div id="tagsArea" class="tags-area"></div>
      <p class="quick-label">よく使う食材をタップして選択</p>
      <div id="quickTags" class="quick-tags"></div>
    </div>
    <div id="ingredientResults"></div>
  </section>

  <!-- レシピ一覧モード -->
  <section id="recipeMode" style="display:none">
    <div class="search-card">
      <h2 class="section-label">📚 レシピを検索</h2>
      <div class="input-row">
        <input id="recipeSearchInput" type="search" placeholder="料理名・韓国語・カテゴリで検索" autocomplete="off" enterkeyhint="search" oninput="searchByName()">
      </div>
    </div>
    <div id="recipeResults"></div>
  </section>
</main>

<!-- 下部ナビ（スマホ用） -->
<nav class="bottom-nav">
  <button id="navIng" class="nav-btn active" onclick="switchMode('ingredient')"><span class="nav-icon">🧊</span>食材から</button>
  <button id="navRec" class="nav-btn" onclick="switchMode('recipe')"><span class="nav-icon">📚</span>レシピ一覧</button>
</nav>

<button id="scrollTopBtn" aria-label="ページ上部へ" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- レシピ詳細モーダル -->
<div id="modalOverlay">
  <div id="modal" role="dialog" aria-modal="true">
    <div id="modalHandleArea"><div class="handle-bar"></div></div>
    <button class="modal-close" aria-label="閉じる" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const recipes=[
{id:1,name:"キムチチゲ",korean:"김치찌개",emoji:"🍲",desc:"韓国の定番！発酵キムチの旨みたっぷりの辛い鍋料理",category:"チゲ・鍋",level:"初級",time:"25分",servings:"2人分",mainIngredients:["キムチ","豚肉","豆腐"],subIngredients:["長ネギ","玉ねぎ"],seasonings:["コチュジャン","ごま油","にんにく","醤油"],steps:["豚肉は一口大、豆腐はさいの目に切る。","鍋にごま油を熱し豚肉を炒め、にんにくで香りを出す。","キムチを加えて2〜3分炒める。","水400ml・コチュジャン・醤油を入れて10分煮る。","豆腐と長ネギを加えて5分煮込んで完成！"],tip:"古くて酸っぱいキムチの方が美味しい。卵を落とすのもおすすめ！"},
{id:2,name:"ビビンバ",korean:"비빔밥",emoji:"🍚",desc:"彩りナムルと肉をご飯に乗せてコチュジャンで混ぜる人気料理",category:"ご飯もの",level:"中級",time:"40分",servings:"2人分",mainIngredients:["ご飯","牛肉","卵"],subIngredients:["ほうれん草","もやし","にんじん","ズッキーニ"],seasonings:["コチュジャン","ごま油","醤油","にんにく","ごま"],steps:["野菜を茹でてごま油・塩・ごまで和えナムルを作る。","にんじんとズッキーニは千切りにして炒める。","牛肉は下味をつけて炒める。","丼にご飯・ナムル・肉を盛り卵黄を乗せる。","コチュジャンを添えてよく混ぜて食べる！"],tip:"石鍋にごま油を塗るとおこげができて最高。"},
{id:3,name:"チーズタッカルビ",korean:"치즈닭갈비",emoji:"🧀",desc:"甘辛い鶏肉ととろ〜りチーズが最高！若者に大人気",category:"メイン",level:"初級",time:"30分",servings:"2人分",mainIngredients:["鶏肉","チーズ","キャベツ"],subIngredients:["さつまいも","玉ねぎ","長ネギ","トッポギ"],seasonings:["コチュジャン","醤油","にんにく","砂糖","ごま油"],steps:["鶏もも肉をタレで下味をつけ15分おく。","野菜を切る。","フライパンに野菜を敷き鶏肉をのせ15分蒸し焼き。","中央を空けてチーズをたっぷり入れる。","チーズが溶けたら具材を絡めて食べる！"],tip:"モッツァレラだとよく伸びる。シメにご飯を入れてリゾット風も◎"},
{id:4,name:"チヂミ",korean:"전/부침개",emoji:"🥞",desc:"カリッともちっと！野菜たっぷりの韓国風お好み焼き",category:"軽食・おつまみ",level:"初級",time:"20分",servings:"2枚分",mainIngredients:["小麦粉","卵","ニラ"],subIngredients:["玉ねぎ","にんじん","イカ","エビ"],seasonings:["醤油","酢","ごま油","塩"],steps:["小麦粉・片栗粉・水・卵・塩で生地を作る。","ニラ・玉ねぎ・にんじんを生地に混ぜる。","ごま油を多めに熱し生地を薄く広げて焼く。","裏返して両面こんがり焼く。","醤油・酢・ごま油のタレで食べる！"],tip:"片栗粉がカリカリのコツ！油は惜しまず使ってね。"},
{id:5,name:"スンドゥブチゲ",korean:"순두부찌개",emoji:"🫕",desc:"ぷるぷる柔らか豆腐がたまらない辛くて優しいスープ",category:"チゲ・鍋",level:"初級",time:"20分",servings:"1人分",mainIngredients:["豆腐","卵","あさり"],subIngredients:["長ネギ","しいたけ","キムチ"],seasonings:["コチュジャン","粉唐辛子","にんにく","ごま油","醤油"],steps:["鍋にごま油を熱しにんにくと粉唐辛子を炒める。","あさりとキムチを炒め水300mlを注ぐ。","絹豆腐をすくって入れしいたけ・長ネギも加える。","味を整え5分煮込む。","卵を割り入れ半熟で火を止めて完成！"],tip:"あさりがなければ豚肉やシーフードミックスでもOK！"},
{id:6,name:"トッポギ",korean:"떡볶이",emoji:"🍡",desc:"もちもち韓国餅を甘辛ソースで煮込んだ国民的おやつ",category:"軽食・おつまみ",level:"初級",time:"15分",servings:"2人分",mainIngredients:["トッポギ","コチュジャン"],subIngredients:["ゆで卵","長ネギ","キャベツ","さつま揚げ"],seasonings:["砂糖","醤油","にんにく","粉唐辛子"],steps:["餅は水にくぐらせる。","鍋に水・コチュジャン・砂糖・醤油を入れ火にかける。","トッポギ・さつま揚げ・キャベツを煮る。","とろみがついたら長ネギを加える。","ゆで卵を添えて完成！"],tip:"チーズを加えると辛さがマイルドに！"},
{id:7,name:"プルコギ",korean:"불고기",emoji:"🥩",desc:"甘めの醤油ダレで漬けた柔らか牛肉。大人気の韓国焼肉",category:"メイン",level:"初級",time:"30分",servings:"2人分",mainIngredients:["牛肉","玉ねぎ"],subIngredients:["にんじん","長ネギ","しいたけ","もやし"],seasonings:["醤油","砂糖","にんにく","ごま油","ごま","梨"],steps:["牛肉は薄切りで食べやすく切る。","タレを作る。","牛肉を20分以上漬ける。","野菜と一緒に炒める。","ごまを振って完成！サンチュに包んでも◎"],tip:"梨がなければりんごやキウイで代用OK。肉が柔らかくなる！"},
{id:8,name:"サムギョプサル",korean:"삼겹살",emoji:"🥓",desc:"厚切り豚バラを焼いて野菜で包む韓国式BBQ",category:"メイン",level:"初級",time:"25分",servings:"2人分",mainIngredients:["豚バラ肉","サンチュ","にんにく"],subIngredients:["大葉","長ネギ","キムチ","玉ねぎ"],seasonings:["サムジャン","ごま油","塩","コショウ"],steps:["豚バラ肉は厚切りにする。","サンチュを洗いにんにくは薄切り。","強火で豚バラをじっくり焼く。","キッチンバサミで一口大にカット。","サンチュに包んで食べる！"],tip:"味噌＋コチュジャン＋ごま油でサムジャンの代用に。"},
{id:9,name:"ヤンニョムチキン",korean:"양념치킨",emoji:"🍗",desc:"カリカリチキンに甘辛ソースを絡めた中毒性MAXの一品",category:"メイン",level:"中級",time:"40分",servings:"2人分",mainIngredients:["鶏肉","片栗粉"],subIngredients:["卵"],seasonings:["コチュジャン","ケチャップ","砂糖","にんにく","醤油","ごま"],steps:["鶏もも肉を切り塩コショウで下味。","片栗粉をまぶし二度揚げでカリカリに。","ソースを加熱する。","チキンをソースに絡める。","ごまを振って完成！🍺"],tip:"二度揚げがカリカリの秘訣！"},
{id:10,name:"ナムル",korean:"나물",emoji:"🥗",desc:"野菜をごま油で和えた韓国の基本副菜。作り置きに最適",category:"副菜",level:"初級",time:"15分",servings:"2人分",mainIngredients:["もやし","ほうれん草"],subIngredients:["にんじん","ズッキーニ","大根"],seasonings:["ごま油","にんにく","塩","ごま","醤油"],steps:["もやしを2分茹でて水気を絞る。","ほうれん草も茹でて5cm幅に切る。","ごま油・にんにく・塩・ごまで和える。","にんじんは千切りにして炒め同様に味付け。","冷蔵庫で3日保存可能！"],tip:"水気をしっかり絞るのがポイント。"},
{id:11,name:"チャプチェ",korean:"잡채",emoji:"🍜",desc:"春雨と野菜を甘辛く炒めた人気おかず",category:"副菜",level:"中級",time:"35分",servings:"3人分",mainIngredients:["春雨","牛肉","ほうれん草"],subIngredients:["にんじん","玉ねぎ","しいたけ","パプリカ"],seasonings:["醤油","砂糖","ごま油","にんにく","ごま"],steps:["春雨を茹でて切る。","牛肉を下味つけて炒める。","野菜を別々に炒める。","全て醤油・砂糖・ごま油で和える。","ごまを振って完成！"],tip:"具材を別々に炒めると仕上がりが全然違います。"},
{id:12,name:"キンパ",korean:"김밥",emoji:"🍙",desc:"韓国風海苔巻き。お弁当やピクニックの定番",category:"ご飯もの",level:"中級",time:"40分",servings:"2本分",mainIngredients:["ご飯","海苔","卵"],subIngredients:["にんじん","ほうれん草","たくあん","カニカマ","牛肉"],seasonings:["ごま油","塩","醤油","砂糖","ごま"],steps:["ご飯にごま油と塩を混ぜて冷ます。","卵は薄焼き。野菜はナムルにする。","牛肉は甘辛く炒める。","海苔にご飯を広げ具材を巻く。","ごま油を塗り切って完成！"],tip:"ご飯を薄く、具材を手前に集中させるのがコツ。"},
{id:13,name:"サムゲタン",korean:"삼계탕",emoji:"🐔",desc:"鶏にもち米を詰めてじっくり煮込んだ滋養スープ",category:"スープ",level:"上級",time:"120分",servings:"2人分",mainIngredients:["鶏肉","もち米","長ネギ"],subIngredients:["なつめ","にんにく","生姜"],seasonings:["塩","コショウ","ごま油"],steps:["もち米は30分水に浸ける。","鶏肉を洗う。","全材料と水を入れ1.5〜2時間煮込む。","アクを取りながら煮る。","塩コショウで味を整えて完成！"],tip:"手羽元でも十分美味しい。夏バテ対策にぴったり！"},
{id:14,name:"テンジャンチゲ",korean:"된장찌개",emoji:"🫕",desc:"韓国味噌で作る家庭の味。ホッとする優しいチゲ",category:"チゲ・鍋",level:"初級",time:"20分",servings:"2人分",mainIngredients:["味噌","豆腐","ズッキーニ"],subIngredients:["玉ねぎ","長ネギ","しいたけ","じゃがいも"],seasonings:["にんにく","粉唐辛子","ごま油"],steps:["豆腐はさいの目、ズッキーニは半月切り。","出汁に味噌を溶く。","じゃがいも・玉ねぎを5分煮る。","豆腐・ズッキーニ・しいたけを加え5〜7分煮込む。","長ネギと粉唐辛子を加えて完成！"],tip:"日本の合わせ味噌でも代用OK。"},
{id:15,name:"タッカンマリ",korean:"닭한마리",emoji:"🍲",desc:"鶏をじっくり煮込んだソウルの名物鍋料理",category:"チゲ・鍋",level:"中級",time:"60分",servings:"3人分",mainIngredients:["鶏肉","じゃがいも","長ネギ"],subIngredients:["トッポギ","にんにく","玉ねぎ"],seasonings:["塩","コショウ","酢","からし","醤油"],steps:["鶏もも肉を大きめに切り血抜き。","鍋に鶏肉・にんにく・長ネギ・水を入れ沸騰。","弱火で30分煮込む。","じゃがいもを加え15分煮る。","酢醤油＋からしで食べる！"],tip:"シメにうどんを入れるのがおすすめ。"},
{id:16,name:"ユッケジャン",korean:"육개장",emoji:"🥘",desc:"牛肉と野菜の辛口スープ。スタミナ満点",category:"スープ",level:"中級",time:"50分",servings:"2人分",mainIngredients:["牛肉","もやし","長ネギ"],subIngredients:["ワラビ","卵"],seasonings:["粉唐辛子","にんにく","醤油","ごま油","塩"],steps:["牛肉を茹でて裂く。","もやしと長ネギを準備。","茹で汁に調味料を加える。","肉と野菜を15分煮込む。","溶き卵を回し入れ完成！"],tip:"二日酔いの朝にも最高のスープ！"},
{id:17,name:"ポッサム",korean:"보쌈",emoji:"🐷",desc:"柔らかく茹でた豚肉を野菜で包んで食べるヘルシー料理",category:"メイン",level:"中級",time:"90分",servings:"3人分",mainIngredients:["豚バラ肉","サンチュ","キムチ"],subIngredients:["大葉","にんにく","長ネギ"],seasonings:["味噌","生姜","コショウ","サムジャン"],steps:["豚バラ塊を長ネギ・生姜と60分茹でる。","アクを取り竹串が通るまで煮る。","休ませて薄くスライス。","サンチュ・キムチを盛り付ける。","包んで食べる！"],tip:"コーラを少し入れると肉が柔らかくなる裏技も。"},
{id:18,name:"カムジャタン",korean:"감자탕",emoji:"🥔",desc:"豚とじゃがいものピリ辛スープ。ボリューム満点",category:"チゲ・鍋",level:"中級",time:"60分",servings:"3人分",mainIngredients:["豚肉","じゃがいも","長ネギ"],subIngredients:["白菜","えのき","大根"],seasonings:["コチュジャン","粉唐辛子","にんにく","醤油","味噌","ごま油"],steps:["豚スペアリブを血抜きし茹でこぼす。","水・にんにく・生姜で30分煮込む。","じゃがいも・大根を加える。","タレで味付けし15分煮込む。","白菜・えのき・長ネギを加えて完成！"],tip:"翌日の方が味が染みて美味しい！"},
{id:19,name:"冷麺",korean:"냉면",emoji:"🍜",desc:"冷たいスープにもちもち麺。夏の定番",category:"麺",level:"初級",time:"15分",servings:"1人分",mainIngredients:["冷麺","きゅうり","卵"],subIngredients:["梨","大根","牛肉","キムチ"],seasonings:["酢","からし","砂糖","醤油","塩"],steps:["麺を茹でて冷水で洗う。","スープを冷やす。","具材を切る。","麺にスープを注ぎ具材を盛る。","酢とからしを加えて完成！"],tip:"スープは前日からキンキンに冷やしておくのがベスト。"},
{id:20,name:"ジャージャー麺",korean:"짜장면",emoji:"🍝",desc:"韓国式黒味噌炸醤麺。甘めの黒ソースが絶品",category:"麺",level:"中級",time:"30分",servings:"2人分",mainIngredients:["中華麺","豚肉","玉ねぎ"],subIngredients:["ズッキーニ","じゃがいも","キャベツ","きゅうり"],seasonings:["チュンジャン","砂糖","片栗粉","ごま油"],steps:["豚肉・野菜をさいの目に切る。","チュンジャンを炒めて苦味を飛ばす。","豚肉・野菜を炒める。","水と砂糖を加えとろみをつける。","麺にソースをかけきゅうりを添えて完成！"],tip:"甜麺醤で代用可能。"},
{id:21,name:"韓国風海鮮チヂミ",korean:"해물파전",emoji:"🦐",desc:"ネギとシーフードたっぷりの贅沢チヂミ",category:"軽食・おつまみ",level:"中級",time:"25分",servings:"2枚分",mainIngredients:["小麦粉","長ネギ","イカ"],subIngredients:["エビ","卵","あさり"],seasonings:["醤油","酢","ごま油","塩"],steps:["生地を作る。","長ネギを並べシーフードを散らす。","生地を流し入れ焼く。","裏返して両面焼く。","酢醤油で食べる！"],tip:"雨の日にチヂミを食べるのが韓国の習慣。マッコリと最高！"},
{id:22,name:"タッカルビ",korean:"닭갈비",emoji:"🍗",desc:"甘辛ダレで炒めた鶏肉と野菜の鉄板料理",category:"メイン",level:"初級",time:"30分",servings:"2人分",mainIngredients:["鶏肉","キャベツ","さつまいも"],subIngredients:["玉ねぎ","長ネギ","トッポギ"],seasonings:["コチュジャン","粉唐辛子","醤油","砂糖","にんにく","ごま油"],steps:["鶏もも肉をタレで下味。","野菜を切る。","野菜を敷き鶏肉を乗せる。","蓋をして15分蒸し焼き。","混ぜて炒めて完成！"],tip:"シメにご飯を入れても◎"},
{id:23,name:"ケランチム",korean:"계란찜",emoji:"🥚",desc:"ふわふわの韓国風茶碗蒸し",category:"副菜",level:"初級",time:"15分",servings:"2人分",mainIngredients:["卵","長ネギ"],subIngredients:["にんじん"],seasonings:["塩","ごま油","だしの素"],steps:["卵を溶き水・塩・だしの素を加える。","鍋に入れ中火にかける。","長ネギを散らしかき混ぜる。","蓋をして3〜4分蒸す。","ごま油を垂らして完成！"],tip:"ぐつぐつ煮るのが韓国流。"},
{id:24,name:"キムチチャーハン",korean:"김치볶음밥",emoji:"🍳",desc:"余ったキムチとご飯で作る定番チャーハン",category:"ご飯もの",level:"初級",time:"10分",servings:"1人分",mainIngredients:["ご飯","キムチ","卵"],subIngredients:["豚肉","長ネギ","チーズ"],seasonings:["ごま油","醤油","コチュジャン"],steps:["ごま油で豚肉を炒める。","キムチを炒める。","ご飯を加えパラパラに炒める。","目玉焼きを乗せる。","チーズをトッピングして完成！"],tip:"酸っぱいキムチが最高に合う。"},
{id:25,name:"トゥブジョリム",korean:"두부조림",emoji:"🫘",desc:"豆腐を甘辛タレで煮込んだご飯がすすむおかず",category:"副菜",level:"初級",time:"20分",servings:"2人分",mainIngredients:["豆腐","長ネギ"],subIngredients:["玉ねぎ"],seasonings:["醤油","コチュジャン","粉唐辛子","にんにく","砂糖","ごま油","ごま"],steps:["豆腐を1cm厚さに切り水気を取る。","両面こんがり焼く。","タレを作る。","タレを回しかけ5分煮絡める。","長ネギとごまを散らして完成！"],tip:"焼かずにそのまま煮てもOK。"},
{id:26,name:"ソルロンタン",korean:"설렁탕",emoji:"🥛",desc:"牛骨をじっくり煮込んだ白濁スープ",category:"スープ",level:"上級",time:"180分",servings:"4人分",mainIngredients:["牛肉","長ネギ"],subIngredients:["大根","素麺"],seasonings:["塩","コショウ","にんにく"],steps:["牛骨と牛肉を血抜きし茹でこぼす。","きれいな水で沸騰させる。","3時間以上白濁するまで煮込む。","牛肉をスライスし盛り付ける。","塩コショウで好みの味に。"],tip:"圧力鍋なら時短可能。"},
{id:27,name:"オイキムチ",korean:"오이김치",emoji:"🥒",desc:"きゅうりにヤンニョムを詰めたさっぱりキムチ",category:"副菜",level:"初級",time:"30分",servings:"4本分",mainIngredients:["きゅうり","にんじん"],subIngredients:["ニラ","大根"],seasonings:["粉唐辛子","にんにく","砂糖","塩","魚醤"],steps:["きゅうりに塩をまぶし10分おく。","十字の切れ目を入れる。","ヤンニョムを作る。","切れ目に詰める。","すぐ食べても半日漬けてもGood！"],tip:"夏にぴったり！"},
{id:28,name:"韓国風のり巻き卵焼き",korean:"계란말이",emoji:"🥚",desc:"野菜入りのふわふわ韓国風卵焼き",category:"副菜",level:"初級",time:"10分",servings:"2人分",mainIngredients:["卵","にんじん","長ネギ"],subIngredients:["ハム","チーズ"],seasonings:["塩","ごま油"],steps:["卵にみじん切りの野菜と塩を加える。","ごま油を引く。","卵液を1/3ずつ流して巻く。","3回に分けて巻く。","冷まして切って完成！"],tip:"チーズを芯にするととろ〜り最高。"},
{id:29,name:"ラッポッキ",korean:"라볶이",emoji:"🍜",desc:"トッポギとラーメンの甘辛煮込み",category:"麺",level:"初級",time:"15分",servings:"2人分",mainIngredients:["トッポギ","インスタントラーメン"],subIngredients:["ゆで卵","キャベツ","長ネギ","さつま揚げ"],seasonings:["コチュジャン","砂糖","醤油","粉唐辛子"],steps:["水にソース材料を入れて沸かす。","トッポギ・キャベツを5分煮る。","ラーメンの麺を加え3〜4分煮る。","長ネギ・ゆで卵を添える。","チーズトッピングもおすすめ！"],tip:"付属スープは使わずコチュジャンソースで味付け。"},
{id:30,name:"コングクス",korean:"콩국수",emoji:"🥜",desc:"豆乳ベースの冷たい麺。夏にぴったり",category:"麺",level:"中級",time:"30分",servings:"2人分",mainIngredients:["素麺","豆乳","きゅうり"],subIngredients:["トマト","卵","ごま"],seasonings:["塩","砂糖","ごま"],steps:["豆乳に塩・砂糖を混ぜて冷やす。","素麺を茹でて冷水で洗う。","きゅうり千切り、トマト薄切り。","素麺に豆乳スープを注ぐ。","具材とごまを盛り付けて完成！"],tip:"無調整豆乳でも十分美味しい。"},

const quickIngredients=["豚肉","鶏肉","牛肉","豆腐","卵","キムチ","ご飯","もやし","長ネギ","玉ねぎ","にんじん","きゅうり","キャベツ","ほうれん草","にんにく","チーズ","海苔","じゃがいも","トッポギ","小麦粉","エビ","イカ","あさり","ニラ","さつまいも","春雨","餃子の皮","ソーセージ"];
let selectedIngredients=[];
function init(){renderQuickTags();renderTags();searchByIngredients();searchByName()}
function switchMode(m){
  document.getElementById('deskModeIng').classList.toggle('active',m==='ingredient');
  document.getElementById('deskModeRec').classList.toggle('active',m==='recipe');
  document.getElementById('navIng').classList.toggle('active',m==='ingredient');
  document.getElementById('navRec').classList.toggle('active',m==='recipe');
  document.getElementById('ingredientMode').style.display=m==='ingredient'?'block':'none';
  document.getElementById('recipeMode').style.display=m==='recipe'?'block':'none';
  if(m==='recipe')searchByName();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderQuickTags(){
  document.getElementById('quickTags').innerHTML=quickIngredients.map(i=>`<button class="quick-tag ${selectedIngredients.includes(i)?'selected':''}" onclick="toggleQuickTag('${i}')">${i}</button>`).join('');
}
function toggleQuickTag(i){const x=selectedIngredients.indexOf(i);if(x>-1)selectedIngredients.splice(x,1);else selectedIngredients.push(i);renderTags();renderQuickTags();searchByIngredients()}
function addIngredient(){const input=document.getElementById('ingredientInput');const v=input.value.trim();if(v&&!selectedIngredients.includes(v)){selectedIngredients.push(v);renderTags();renderQuickTags();searchByIngredients()}input.value=''}
function removeIngredient(i){selectedIngredients=selectedIngredients.filter(x=>x!==i);renderTags();renderQuickTags();searchByIngredients()}
function renderTags(){document.getElementById('tagsArea').innerHTML=selectedIngredients.map(i=>`<span class="tag">${i}<button class="tag-remove" aria-label="${i}を削除" onclick="removeIngredient('${i}')">✕</button></span>`).join('')}
function searchByIngredients(){
  if(!selectedIngredients.length){document.getElementById('ingredientResults').innerHTML=`<div class="empty-state"><div class="empty-emoji">🧊</div><div class="empty-title">食材を追加してね！</div><div class="empty-desc">冷蔵庫にある食材を入力するか、<br>よく使う食材タグをタップしてみて</div></div>`;return}
  const results=recipes.map(r=>{
    const all=[...r.mainIngredients,...r.subIngredients];
    const matched=all.filter(i=>selectedIngredients.some(s=>i.includes(s)||s.includes(i)));
    const missing=all.filter(i=>!selectedIngredients.some(s=>i.includes(s)||s.includes(i)));
    const mm=r.mainIngredients.filter(i=>selectedIngredients.some(s=>i.includes(s)||s.includes(i)));
    const score=(mm.length*2+matched.length)/(r.mainIngredients.length*2+all.length)*100;
    return{...r,matched,missing,score:Math.round(score)}
  }).filter(r=>r.score>0).sort((a,b)=>b.score-a.score);
  const c=document.getElementById('ingredientResults');
  if(!results.length){c.innerHTML=`<div class="empty-state"><div class="empty-emoji">😢</div><div class="empty-title">見つからなかったよ…</div><div class="empty-desc">別の食材を追加してみてね！</div></div>`;return}
  c.innerHTML=`<div class="results-header"><h2>🎉 作れそうな韓国料理</h2><span class="results-count">${results.length}件</span></div><div class="results-grid">${results.map(r=>`<div class="recipe-card" onclick="openModal(${r.id})"><div class="card-top"><div class="card-emoji">${r.emoji}</div><div class="card-info"><div class="card-title">${r.name} <span class="card-korean">${r.korean}</span></div><div class="card-desc">${r.desc}</div></div></div><div class="match-bar-wrap"><div class="match-label"><span>食材マッチ度</span><span class="pct">${r.score}%</span></div><div class="match-bar"><div class="match-fill" style="width:${r.score}%"></div></div></div><div class="card-tags">${r.matched.map(m=>`<span class="card-tag have">✓ ${m}</span>`).join('')}${r.missing.slice(0,4).map(m=>`<span class="card-tag need">＋ ${m}</span>`).join('')}${r.missing.length>4?`<span class="card-tag need">他${r.missing.length-4}つ</span>`:''}</div><span class="card-arrow">›</span></div>`).join('')}</div>`;
}
function searchByName(){
  const q=document.getElementById('recipeSearchInput')?.value.trim().toLowerCase()||'';
  const f=q?recipes.filter(r=>r.name.toLowerCase().includes(q)||r.korean.includes(q)||r.category.includes(q)||r.desc.includes(q)):recipes;
  const c=document.getElementById('recipeResults');
  if(!f.length){c.innerHTML=`<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-title">見つからなかったよ…</div><div class="empty-desc">別のキーワードで検索してみてね</div></div>`;return}
  c.innerHTML=`<div class="results-header"><h2>${q?'🔎 検索結果':'📚 全レシピ一覧'}</h2><span class="results-count">${f.length}件</span></div><div class="all-recipes-grid">${f.map(r=>`<div class="mini-card" onclick="openModal(${r.id})"><div class="mini-emoji">${r.emoji}</div><div class="mini-info"><div class="mini-title">${r.name} <span style="font-weight:400;color:#999;font-size:11px">${r.korean}</span></div><div class="mini-sub">${r.category} ・ ${r.level} ・ ${r.time}</div></div><span class="mini-arrow">›</span></div>`).join('')}</div>`;
}
function openModal(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  document.getElementById('modalBody').innerHTML=`<div class="modal-emoji">${r.emoji}</div><div class="modal-title">${r.name}</div><div class="modal-korean">${r.korean}</div><div class="modal-desc">${r.desc}</div><div class="modal-meta"><div class="meta-item"><span>📂</span> ${r.category}</div><div class="meta-item"><span>📊</span> ${r.level}</div><div class="meta-item"><span>⏱️</span> ${r.time}</div><div class="meta-item"><span>👥</span> ${r.servings}</div></div><div class="modal-section"><h3><span>🥬</span> 材料</h3><div class="ingredients-grid">${r.mainIngredients.map(i=>`<div class="ingredient-item"><span class="dot main"></span>${i}<span style="font-size:10px;color:#999;margin-left:auto">メイン</span></div>`).join('')}${r.subIngredients.map(i=>`<div class="ingredient-item"><span class="dot sub"></span>${i}</div>`).join('')}${r.seasonings.map(i=>`<div class="ingredient-item"><span class="dot sauce"></span>${i}<span style="font-size:10px;color:#999;margin-left:auto">調味料</span></div>`).join('')}</div></div><div class="modal-section"><h3><span>👨‍🍳</span> 作り方</h3><ol class="steps-list">${r.steps.map((s,i)=>`<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></li>`).join('')}</ol></div><div class="modal-section"><h3><span>💡</span> コツ・ポイント</h3><div class="tip-box">${r.tip}</div></div>`;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modal').scrollTop=0;
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');document.body.style.overflow=''}
// Enterキー(スマホキーボードの「完了」)で食材追加
document.getElementById('ingredientInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addIngredient()}});
// 背景タップでモーダルを閉じる
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
// Swipe down to close
(function(){let sy=0,cy=0,d=false;const h=document.getElementById('modalHandleArea'),m=document.getElementById('modal');
h.addEventListener('touchstart',e=>{if(m.scrollTop<=0){sy=e.touches[0].clientY;cy=sy;d=true;m.style.transition='none'}},{passive:true});
h.addEventListener('touchmove',e=>{if(!d)return;cy=e.touches[0].clientY;const df=cy-sy;if(df>0){m.style.transform=`translateY(${df}px)`;m.style.opacity=Math.max(.5,1-df/400)}},{passive:true});
h.addEventListener('touchend',()=>{if(!d)return;d=false;m.style.transition='transform .3s ease,opacity .3s ease';if(cy-sy>120)closeModal();m.style.transform='';m.style.opacity=''})})();
// Scroll top button
window.addEventListener('scroll',()=>{const b=document.getElementById('scrollTopBtn');if(window.scrollY>400)b.classList.add('show');else b.classList.remove('show')},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
init();
// PWA: オフラインでも動くようにService Workerを登録
if('serviceWorker' in navigator&&(location.protocol==='https:'||location.hostname==='localhost')){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
